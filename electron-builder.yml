appId: de.brors.clip2guide
productName: Clip2Guide
copyright: Copyright © 2025–2026 Joerg Brors

# Einzuschließende Dateien (relativ zum Projektroot)
files:
  - dist/**
  - backend/app/**
  - backend/requirements.txt
  - "!backend/.venv/**"
  - "!backend/**/__pycache__/**"
  - "!backend/**/*.pyc"

# Zusätzliche Ressourcen – landen in resources/ und sind als normale Dateien
# über process.resourcesPath zugänglich (werden nicht ins ASAR gepackt)
extraResources:
  - from: initial.ps1
    to: initial.ps1
  - from: initial.sh
    to: initial.sh
  - from: localstuff/env.example
    to: env.example
  - from: backend/requirements.txt
    to: backend/requirements.txt

# Dateien niemals einschließen
# (tools/ und workspace/ werden bei erstem Start heruntergeladen/erzeugt)
asarUnpack:
  - "**/*.py"
  - "**/*.pyd"
  - "**/*.so"
  - "**/*.dylib"

# Windows – NSIS-Installer + Portable
win:
  executableName: clip2guide
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: frontend/public/icon.ico

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  installerHeaderIcon: frontend/public/icon.ico
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: "Clip2Guide-Setup-win-x64.${ext}"

portable:
  artifactName: "Clip2Guide-Portable-win-x64.${ext}"

# macOS – PKG (kein DMG; PKG wird vom macOS-Installer verarbeitet und
# umgeht das Quarantine-/Gatekeeper-"App ist beschädigt"-Problem)
mac:
  target:
    - target: pkg
  artifactName: "Clip2Guide-mac-arm64.${ext}"
  category: public.app-category.productivity
  icon: frontend/public/icon.icns
  hardenedRuntime: false
  gatekeeperAssess: false

# Ausgabeverzeichnis
directories:
  output: dist/release
  buildResources: build

# electron-builder generiert keine Auto-Update-Metadaten
publish: []
