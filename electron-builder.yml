appId: de.brors.clip2guide
productName: Clip2Guide
copyright: Copyright © 2025–2026 Joerg Brors

# Einzuschließende Dateien (relativ zum Projektroot)
files:
  - dist/**
  - backend/app/**
  - backend/requirements.txt
  - "!backend/.venv/**"
  - "!backend/**/__pycache__/**"
  - "!backend/**/*.pyc"

# Zusätzliche Ressourcen – landen in resources/ und sind als normale Dateien
# über process.resourcesPath zugänglich (werden nicht ins ASAR gepackt)
extraResources:
  - from: initial.ps1
    to: initial.ps1
  - from: initial.sh
    to: initial.sh
  - from: localstuff/env.example
    to: env.example
  - from: backend/requirements.txt
    to: backend/requirements.txt

# Dateien niemals einschließen
# (tools/ und workspace/ werden bei erstem Start heruntergeladen/erzeugt)
asarUnpack:
  - "**/*.py"
  - "**/*.pyd"
  - "**/*.so"
  - "**/*.dylib"

# Windows – NSIS-Installer
win:
  executableName: clip2guide
  target:
    - target: nsis
      arch:
        - x64
    - target: portable
      arch:
        - x64
  icon: frontend/public/icon.ico

nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  installDir: $PROGRAMFILES64\Clip2Guide
  installerHeaderIcon: frontend/public/icon.ico
  deleteAppDataOnUninstall: false
  runAfterFinish: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# macOS – DMG
mac:
  target:
    - target: dmg
  category: public.app-category.productivity
  icon: frontend/public/icon.icns
  # Ohne Apple-Developer-Zertifikat: notarize deaktivieren
  # (User muss Rechtsklick → Öffnen verwenden)
  hardenedRuntime: false
  gatekeeperAssess: false

dmg:
  title: "Clip2Guide ${version}"
  background: frontend/public/dmg-background.png
  window:
    width: 540
    height: 380

# Ausgabeverzeichnis
directories:
  output: dist/release
  buildResources: build

# electron-builder generiert keine Auto-Update-Metadaten
publish: []
