name: Setup on tag

on:
  push:
    tags:
      - "ci-*"    # nur explizite CI-Test-Tags, z.B. ci-test1 (nicht v*.*.*)
  workflow_dispatch:
    inputs:
      ai_provider:
        description: "AI provider to validate"
        type: choice
        default: gemini
        options:
          - gemini
          - openai
      force_setup:
        description: "Force tool reinstall"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  setup:
    name: Prepare and verify setup
    runs-on: windows-latest
    timeout-minutes: 45

    env:
      AI_PROVIDER: ${{ inputs.ai_provider || 'gemini' }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache setup output
        id: setup-cache
        uses: actions/cache@v4
        with:
          path: |
            backend/.venv
            tools
          key: clip2guide-setup-${{ runner.os }}-${{ hashFiles('initial.ps1', 'backend/requirements.txt', '.env.example') }}
          restore-keys: |
            clip2guide-setup-${{ runner.os }}-

      - name: Write .env from secrets
        shell: pwsh
        run: |
          # API-Keys sind optional – kein Key ist im CI zwingend erforderlich.
          # Secrets werden eingetragen wenn sie gesetzt sind, sonst leer gelassen.
          @(
            "APP_ENV=ci"
            "APP_HOST=127.0.0.1"
            "APP_PORT=8787"
            "AI_PROVIDER=${env:AI_PROVIDER}"
            "GEMINI_API_KEY=${env:GEMINI_API_KEY}"
            "GEMINI_MODEL=${env:GEMINI_MODEL}"
            "OPENAI_API_KEY=${env:OPENAI_API_KEY}"
            "OPENAI_MODEL=${env:OPENAI_MODEL}"
            "FFMPEG_PATH=./tools/ffmpeg/bin/ffmpeg.exe"
            "FFPROBE_PATH=./tools/ffmpeg/bin/ffprobe.exe"
            "AUTO_EDITOR_PATH=./tools/auto-editor/auto-editor-windows-x86_64.exe"
            "WORKSPACE_ROOT=./workspace"
            "UPLOAD_DIR=./workspace/uploads"
            "NORMALIZED_DIR=./workspace/normalized"
            "CUT_DIR=./workspace/cut"
            "FRAMES_DIR=./workspace/frames"
            "AI_OUTPUT_DIR=./workspace/ai-output"
            "RENDER_OUTPUT_DIR=./workspace/output"
            "DEFAULT_LANGUAGE=de"
            "OUTPUT_VIDEO_WIDTH=1920"
            "OUTPUT_VIDEO_HEIGHT=1080"
            "FRAME_EXTRACTION_FPS=0.333"
            "SCENE_DIFF_THRESHOLD=0.08"
            "MIN_SCENE_SECONDS=1.0"
            "AUTO_EDITOR_AUDIO_EDIT=audio:threshold=0.03"
            "AUTO_EDITOR_MOTION_EDIT=motion:threshold=0.08"
            "AUTO_EDITOR_COMBINED_EDIT=(or audio:0.03 motion:0.08)"
            "AUTO_EDITOR_MARGIN=0.5s"
            "MAX_PARALLEL_LANGUAGES=4"
            "FFMPEG_THREADS_PER_JOB=2"
          ) | Set-Content -Path .env -Encoding utf8

      - name: Run idempotent setup
        shell: pwsh
        run: |
          $args = @("-Root", ".")
          if ("${{ inputs.force_setup }}" -eq "true") {
            $args += "-ForceFFmpegDownload"
            $args += "-ForceAutoEditorDownload"
          }
          .\initial.ps1 @args

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend and Electron
        run: npm run build

      - name: Verify backend imports
        shell: pwsh
        working-directory: backend
        run: |
          .\.venv\Scripts\python.exe -c "from app.main import app; print(app.title)"

      - name: Upload setup evidence
        uses: actions/upload-artifact@v4
        with:
          name: setup-evidence-${{ github.ref_name }}
          path: |
            dist
            .env.example
          if-no-files-found: error
