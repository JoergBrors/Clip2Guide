name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # für GitHub-Release und Upload von Assets

jobs:
  build:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            arch: x64
          - os: macos-latest
            platform: mac
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Python wird NICHT auf den Build-Agent installiert – es gibt keine
      # .venv im Installer. Python lädt initial.ps1/initial.sh beim ersten Start.
      # Lediglich für den TypeScript-Compile-Schritt wird Node benötigt.

      - name: Install Node dependencies
        run: npm ci

      - name: Build (Vite + Electron TypeScript)
        run: npm run build

      # macOS: ICO → ICNS konvertieren via Pillow + iconutil
      # icon.ico liegt im Repo (frontend/public/icon.ico)
      - name: Build icon.icns (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          mkdir -p /tmp/icon.iconset
          pip3 install --quiet --break-system-packages Pillow
          python3 - <<'PYEOF'
          from PIL import Image
          import zlib, struct, os
          os.makedirs('/tmp/icon.iconset', exist_ok=True)
          ico = Image.open('frontend/public/icon.ico').convert('RGBA')
          for size, name in [(16,'icon_16x16.png'),(32,'icon_32x32.png'),(128,'icon_128x128.png'),(256,'icon_256x256.png'),(512,'icon_512x512.png')]:
              ico.resize((size, size), Image.LANCZOS).save(f'/tmp/icon.iconset/{name}')
          # DMG-Hintergrund als einfaches grau-PNG erzeugen
          def make_png(w, h):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', crc)
              rows = b''.join(b'\x00' + bytes([240, 240, 240]) * w for _ in range(h))
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR', ihdr) + chunk(b'IDAT', zlib.compress(rows)) + chunk(b'IEND', b''))
          open('frontend/public/dmg-background.png', 'wb').write(make_png(540, 380))
          PYEOF
          iconutil --convert icns /tmp/icon.iconset -o frontend/public/icon.icns

      # Ad-hoc Signierung VOR dem Packaging: die .app wird direkt im Electron-
      # Build-Ausgabeverzeichnis signiert, bevor electron-builder sie ins PKG packt.
      # '-' = lokale Ad-hoc-Identität, kein Apple-Zertifikat nötig.
      # Verhindert die Gatekeeper-Meldung "App ist beschädigt".
      - name: Ad-hoc sign app before packaging (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          # electron legt die .app unter dist/mac-arm64/ ab (vor dem electron-builder-Lauf)
          APP=$(find dist -maxdepth 2 -name "*.app" | head -1)
          if [ -n "$APP" ]; then
            echo "Pre-signing: $APP"
            codesign --deep --force --sign - "$APP"
          else
            echo "No .app found yet – signing will happen after build step"
          fi

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Verhindert macOS-Notarisierung (kein Apple-Zertifikat im CI)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --${{ matrix.platform }} --${{ matrix.arch }} --publish never

      # Post-build Signierung: .app aus dem release-Verzeichnis nochmals signieren
      # und Quarantine-Attribute aus dem PKG entfernen.
      - name: Ad-hoc sign & strip quarantine (macOS)
        if: matrix.platform == 'mac'
        shell: bash
        run: |
          APP=$(find dist/release -name "*.app" -maxdepth 3 | head -1)
          if [ -n "$APP" ]; then
            echo "Post-signing: $APP"
            codesign --deep --force --sign - "$APP"
          fi
          find dist/release -name "*.pkg" -exec xattr -cr {} \;

      - name: List release artifacts
        shell: bash
        run: ls -lh dist/release/ 2>/dev/null || dir dist\release 2>/dev/null || true

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}-${{ matrix.arch }}
          path: |
            dist/release/*.exe
            dist/release/*.pkg
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-win-x64
          path: artifacts/win
        continue-on-error: true

      - name: Download macOS arm64 installer
        uses: actions/download-artifact@v4
        with:
          name: installer-mac-arm64
          path: artifacts/mac
        continue-on-error: true

      - name: List downloaded artifacts
        run: find artifacts/ -type f || true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "artifacts/win/*.exe,artifacts/mac/*.pkg"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          body: |
            ## Clip2Guide ${{ github.ref_name }}

            ### Installation
            - **Windows (Installer)**: `Clip2Guide.Setup.*.exe` herunterladen und ausführen.
              Falls Windows Smart App Control den Installer blockiert (kein Dialog erscheint),
              bitte die **Portable-Version** verwenden:
            - **Windows (Portable)**: `Clip2Guide.*.exe` (ohne „Setup") herunterladen und
              direkt starten – keine Installation notwendig.
              Beim ersten Start startet automatisch ein Setup-Wizard, der Python, FFmpeg und
              Auto-Editor herunterlädt. Danach AI-Provider und API-Key eintragen.
            - **macOS**: `Clip2Guide-*-arm64.pkg` herunterladen und doppelklicken.
              Der macOS-Installer führt durch die Installation.
              **Hinweis**: Da kein Apple-Entwicklerzertifikat verwendet wird, erscheint
              beim ersten Öffnen eine Gatekeeper-Warnung → **Rechtsklick → „Öffnen"**.

            ### API-Keys
            API-Keys werden **nicht** im Installer gespeichert. Du trägst sie beim ersten Start
            im Setup-Wizard ein. Sie werden im persönlichen Benutzerverzeichnis gespeichert.
          token: ${{ secrets.GITHUB_TOKEN }}
