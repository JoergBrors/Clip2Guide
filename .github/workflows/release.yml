name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # für GitHub-Release und Upload von Assets

jobs:
  build:
    name: Build installer (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Python wird NICHT auf den Build-Agent installiert – es gibt keine
      # .venv im Installer. Python lädt initial.ps1/initial.sh beim ersten Start.
      # Lediglich für den TypeScript-Compile-Schritt wird Node benötigt.

      - name: Install Node dependencies
        run: npm ci

      - name: Build (Vite + Electron TypeScript)
        run: npm run build

      # macOS: gültige Placeholder-Icons mit Python + iconutil erzeugen
      - name: Ensure icon placeholders (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p frontend/public /tmp/icon.iconset
          python3 - <<'PYEOF'
          import zlib, struct, os
          def make_png(w, h, r=200, g=200, b=200):
              def chunk(tag, data):
                  crc = zlib.crc32(tag + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + tag + data + struct.pack('>I', crc)
              rows = b''.join(b'\x00' + bytes([r, g, b]) * w for _ in range(h))
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              return (b'\x89PNG\r\n\x1a\n' +
                      chunk(b'IHDR', ihdr) +
                      chunk(b'IDAT', zlib.compress(rows)) +
                      chunk(b'IEND', b''))
          for sz, name in [(16,'icon_16x16.png'),(32,'icon_32x32.png'),(128,'icon_128x128.png'),(256,'icon_256x256.png'),(512,'icon_512x512.png')]:
              open(f'/tmp/icon.iconset/{name}', 'wb').write(make_png(sz, sz))
          open('frontend/public/dmg-background.png', 'wb').write(make_png(540, 380, 240, 240, 240))
          PYEOF
          iconutil --convert icns /tmp/icon.iconset -o frontend/public/icon.icns

      # Windows: gültiges ICO (1×1 px, 24bpp) mit Python erzeugen
      - name: Ensure icon placeholder (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "frontend/public" | Out-Null
          python -c "import struct, os; os.makedirs('frontend/public', exist_ok=True); bmp = struct.pack('<IiiHHIIiiII', 40, 1, 2, 1, 24, 0, 0, 0, 0, 0, 0) + bytes([255,255,255,0,0,0,0,0]); ico = struct.pack('<HHH', 0, 1, 1) + struct.pack('<BBBBHHIi', 1, 1, 0, 0, 1, 24, len(bmp), 22) + bmp; open('frontend/public/icon.ico', 'wb').write(ico)"

      - name: Package with electron-builder
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Verhindert macOS-Notarisierung (kein Apple-Zertifikat im CI)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --${{ matrix.platform }} --publish never

      - name: List release artifacts
        shell: bash
        run: ls -lh dist/release/ 2>/dev/null || dir dist\release 2>/dev/null || true

      - name: Upload Release Assets
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.platform }}
          path: |
            dist/release/*.exe
            dist/release/*.dmg
          if-no-files-found: warn

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download Windows installer
        uses: actions/download-artifact@v4
        with:
          name: installer-win
          path: artifacts/win
        continue-on-error: true

      - name: Download macOS installer
        uses: actions/download-artifact@v4
        with:
          name: installer-mac
          path: artifacts/mac
        continue-on-error: true

      - name: List downloaded artifacts
        run: find artifacts/ -type f || true

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: "artifacts/win/*.exe,artifacts/mac/*.dmg"
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generateReleaseNotes: true
          body: |
            ## Clip2Guide ${{ github.ref_name }}

            ### Installation
            - **Windows**: `Clip2Guide-Setup-*.exe` herunterladen und ausführen.
              Beim ersten Start startet automatisch ein Setup-Wizard, der Python, FFmpeg und
              Auto-Editor herunterlädt. Danach AI-Provider und API-Key eintragen.
            - **macOS**: `Clip2Guide-*.dmg` herunterladen, mounten und in Applications ziehen.
              **Hinweis**: Da kein Apple-Entwicklerzertifikat verwendet wird, erscheint beim
              ersten Start eine Gatekeeper-Warnung → Rechtsklick auf App → „Öffnen".

            ### API-Keys
            API-Keys werden **nicht** im Installer gespeichert. Du trägst sie beim ersten Start
            im Setup-Wizard ein. Sie werden im persönlichen Benutzerverzeichnis gespeichert.
          token: ${{ secrets.GITHUB_TOKEN }}
